name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin"
          - platform: macos-13
            args: "--target x86_64-apple-darwin"
            rust_targets: "x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "tuzi switch ${{ github.ref_name }}"
          releaseBody: |
            ## 安装方式

            ### macOS / Linux 一键安装

            ```bash
            curl -fsSL https://raw.githubusercontent.com/tuziapi/tuzi-switch/${{ github.ref_name }}/scripts/install_tuzi_switch.sh | bash
            ```

            或指定版本：

            ```bash
            TUZI_SWITCH_TAG=${{ github.ref_name }} curl -fsSL https://raw.githubusercontent.com/tuziapi/tuzi-switch/${{ github.ref_name }}/scripts/install_tuzi_switch.sh | bash
            ```

            ### Windows

            下载下方 Assets 中的 `.msi` 安装包，双击安装即可。

            ---

            See the assets below to download the installer for your platform.
          releaseDraft: true
          prerelease: false
          releaseAssetNamePattern: "tuzi-switch-[platform]-[arch][setup][ext]"
          args: ${{ matrix.args }}

  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Rename and upload Linux assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"

          rename_and_upload() {
            local src="$1"
            local ext="${src##*.}"
            local arch
            case "$(uname -m)" in
              x86_64) arch="x86_64" ;;
              aarch64) arch="aarch64" ;;
              *) arch="$(uname -m)" ;;
            esac
            local dest="tuzi-switch-linux-${arch}.${ext}"
            cp "$src" "$dest"
            gh release upload "$TAG" "$dest" --clobber
          }

          find "$BUNDLE_DIR/appimage" -name "*.AppImage" | while read f; do rename_and_upload "$f"; done
          find "$BUNDLE_DIR/deb"      -name "*.deb"      | while read f; do rename_and_upload "$f"; done
          find "$BUNDLE_DIR/rpm"      -name "*.rpm"      | while read f; do rename_and_upload "$f"; done

  upload-install-script:
    needs: [build, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload install script to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            scripts/install_tuzi_switch.sh \
            --clobber
