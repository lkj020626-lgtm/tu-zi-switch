name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin"
          - platform: macos-13
            args: "--target x86_64-apple-darwin"
            rust_targets: "x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "tuzi switch ${{ github.ref_name }}"
          releaseBody: |
            ## 安装方式

            ### macOS / Linux 一键安装

            ```bash
            curl -fsSL https://raw.githubusercontent.com/tuziapi/tuzi-switch/${{ github.ref_name }}/scripts/install_tuzi_switch.sh | bash
            ```

            或指定版本：

            ```bash
            TUZI_SWITCH_TAG=${{ github.ref_name }} curl -fsSL https://raw.githubusercontent.com/tuziapi/tuzi-switch/${{ github.ref_name }}/scripts/install_tuzi_switch.sh | bash
            ```

            ### Windows

            下载下方 Assets 中的 `.msi` 安装包，双击安装即可。

            ---

            See the assets below to download the installer for your platform.
          releaseDraft: true
          prerelease: false
          releaseAssetNamePattern: "tuzi-switch-[platform]-[arch][setup][ext]"
          args: ${{ matrix.args }}

  upload-install-script:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload install script to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            scripts/install_tuzi_switch.sh \
            --clobber
